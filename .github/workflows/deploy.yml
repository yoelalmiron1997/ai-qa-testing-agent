name: Deploy Notification & Environment Status

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy-status:
    name: Mark Production Deployment Active
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ai-qa-testing-agent.onrender.com
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Live Deployment HTTP Response
        run: |
          curl -s -I https://ai-qa-testing-agent.onrender.com | head -n 5
